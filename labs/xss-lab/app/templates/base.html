<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "XSS Shop Demo" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-soft: #0b1220;
      --border: #243041;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --warning-bg: rgba(245, 158, 11, 0.12);
      --warning-border: rgba(245, 158, 11, 0.35);
      --danger-bg: rgba(239, 68, 68, 0.12);
      --danger-border: rgba(239, 68, 68, 0.35);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: min(1200px, 92%);
      margin: 0 auto;
      padding: 1.5rem 0 2rem 0;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .topbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 1.45rem;
      font-weight: bold;
      text-decoration: none;
    }

    .nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav a,
    a {
      color: #93c5fd;
      text-decoration: none;
    }

    .nav a:hover,
    a:hover {
      text-decoration: underline;
    }

    .hero,
    .card,
    .notice,
    .warning,
    .error {
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 1rem;
    }

    .hero,
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .notice,
    .warning {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
    }

    .error {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .product-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .product-thumb {
      height: 170px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1d4ed8, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: white;
    }

    .price {
      font-size: 1.15rem;
      font-weight: bold;
      color: white;
    }

    .muted {
      color: var(--muted);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #020817;
      color: var(--text);
      margin-bottom: 0.9rem;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button,
    .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
    }

    button:hover,
    .btn:hover {
      background: var(--accent-hover);
      text-decoration: none;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    code {
      background: #020817;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.12rem 0.35rem;
      color: #cbd5e1;
    }

    .review {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.85rem;
    }

    .unsafe-box {
      margin-top: 0.8rem;
      padding: 1rem;
      border: 1px dashed #ef4444;
      border-radius: 10px;
      background: rgba(127, 29, 29, 0.18);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <a class="brand" href="/">XSS Shop Demo</a>

      <nav class="nav">
        <a href="/">Inicio</a>
        <a href="/search?q=phone">Buscar</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

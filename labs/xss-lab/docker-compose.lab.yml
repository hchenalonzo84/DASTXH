# ==========================================================
# docker-compose.lab.yml
# Laboratorio XSS propio y mínimo para DASTXH
#
# Objetivo:
# - ofrecer un sitio pequeño, controlado y parametrizado
# - facilitar pruebas con Dalfox
# - mantener el laboratorio separado del núcleo principal
# ==========================================================

services:
  xss-lab:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: dastxh-xss-lab
    restart: unless-stopped

    # ------------------------------------------------------
    # Puerto expuesto al host:
    # host 5001 -> contenedor 5000
    # ------------------------------------------------------
    ports:
      - "5001:5000"

    # ------------------------------------------------------
    # Red compartida con DASTXH
    # ------------------------------------------------------
    networks:
      - dastxh_net


networks:
  dastxh_net:
    external: true
    name: dastxh_net
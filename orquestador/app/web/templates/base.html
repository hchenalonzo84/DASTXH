<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "DASTXH" }}</title>

  <!-- =====================================================
       Bootstrap CSS
       - Lo usamos como apoyo visual para tabs, grid, tablas,
         alerts, badges y layout general.
       - Nuestro styles.css seguirá cargando después para poder
         sobrescribir detalles visuales del tema actual.
       ===================================================== -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Estilos propios del proyecto -->
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1>DASTXH</h1>
      <nav>
        <a href="/">Inicio</a>
        <a href="/history">Historial</a>
        <a href="/docs" target="_blank" rel="noopener noreferrer">API Docs</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- =====================================================
       Bootstrap JS Bundle
       - Incluye el soporte para tabs, collapse, dropdowns, etc.
       - Nos servirá especialmente para la vista de detalle
         con pestañas Pretty / Raw / Artifacts.
       ===================================================== -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <!-- Script propio del proyecto -->
  <script src="/static/js/app.js"></script>
</body>
</html>

# ==========================================================
# docker-compose.yml
# DASTXH - Orquestación principal del prototipo
#
# Servicios:
#   - db          : Base de datos PostgreSQL
#   - orquestador : Backend principal (CLI + GUI web con FastAPI)
#   - pgadmin     : Administración manual de PostgreSQL
#
# Persistencia:
#   - pgdata       : volumen nombrado para PostgreSQL
#   - pgadmin_data : volumen nombrado para pgAdmin
#   - ./workdata   : bind mount en host para reportes/evidencias
#
# Red:
#   - dastxh_net   : red bridge interna explícita del proyecto
# ==========================================================

services:
  # --------------------------------------------------------
  # Servicio: db
  # - Base de datos PostgreSQL del proyecto
  # - Usa volumen nombrado para mantener la persistencia
  # - Ejecuta schema.sql solo cuando la BD se inicializa
  #   por primera vez
  # --------------------------------------------------------
  db:
    image: postgres:18.3-alpine3.23
    container_name: dastxh-db
    restart: unless-stopped

    # Variables de entorno de PostgreSQL
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # Puerto expuesto al host para acceso externo opcional
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    # Persistencia + script inicial del esquema
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

    # Verificación de salud para esperar a que PostgreSQL
    # esté listo antes de que lo usen otros servicios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

    # Red interna explícita del proyecto
    networks:
      - dastxh_net

  # --------------------------------------------------------
  # Servicio: orquestador
  # - Contenedor principal de DASTXH
  # - Aloja:
  #     * CLI
  #     * GUI web con FastAPI
  #     * acceso a curl, hsecscan y dalfox
  #
  # Nota:
  # - Arranca la GUI web por defecto
  # - La CLI seguirá disponible con:
  #   docker compose exec orquestador python3 main.py --url ...
  # --------------------------------------------------------
  orquestador:
    build:
      context: ./orquestador
      dockerfile: Dockerfile

    container_name: dastxh-orquestador
    restart: unless-stopped

    # Espera a que la base de datos esté saludable
    depends_on:
      db:
        condition: service_healthy

    # Variables de entorno internas del backend
    environment:
      # Conexión a PostgreSQL usando el nombre del servicio "db"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      # Timeout por defecto para los análisis
      DEFAULT_TIMEOUT_SECONDS: ${DEFAULT_TIMEOUT_SECONDS:-30}

      # Directorio lógico de trabajo dentro del contenedor
      WORKDIR: /work

    # Puerto expuesto para la GUI web / API
    ports:
      - "${WEB_PORT:-8000}:8000"

    # Bind mount:
    # La carpeta local ./workdata se verá como /work
    # dentro del contenedor, para que los reportes
    # queden visibles desde el host
    volumes:
      - ./workdata:/work

    # Directorio de trabajo por defecto
    working_dir: /app/app

    # Comando por defecto: arranca FastAPI con Uvicorn
    # --reload es útil en desarrollo
    command:
      [
        "uvicorn",
        "webapp:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload"
      ]

    # Red interna explícita del proyecto
    networks:
      - dastxh_net

  # --------------------------------------------------------
  # Servicio: pgadmin
  # - Interfaz web para administrar PostgreSQL
  # - Permite consultar tablas, ejecutar SQL,
  #   revisar registros y explorar la BD
  # --------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: dastxh-pgadmin
    restart: unless-stopped

    # Espera a que la base de datos esté lista
    depends_on:
      db:
        condition: service_healthy

    # Credenciales iniciales de pgAdmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    # Puerto web expuesto al host
    ports:
      - "${PGADMIN_PORT:-5050}:80"

    # Volumen para conservar configuración interna de pgAdmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin

    # Red interna explícita del proyecto
    networks:
      - dastxh_net

# ----------------------------------------------------------
# Volúmenes nombrados
# - pgdata: persistencia de PostgreSQL
# - pgadmin_data: persistencia de pgAdmin
# ----------------------------------------------------------
volumes:
  pgdata:
  pgadmin_data:

# ----------------------------------------------------------
# Redes explícitas del proyecto
# - dastxh_net: red bridge interna para comunicación
#   entre db, orquestador y pgadmin
# ----------------------------------------------------------
networks:
  dastxh_net:
    driver: bridge
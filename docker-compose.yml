# ==========================================================
# docker-compose.yml
# DASTXH - Orquestación principal del proyecto
#
# Este archivo levanta:
# - la base de datos principal de DASTXH
# - el backend principal (orquestador)
# - pgAdmin para revisar la BD principal
# - la base de datos del laboratorio combinado
# - el laboratorio combinado
#
# Nota importante sobre PostgreSQL 18+:
# Los volúmenes deben montarse en /var/lib/postgresql
# y no en /var/lib/postgresql/data
# ==========================================================

services:
  # --------------------------------------------------------
  # Servicio: db
  # Base de datos principal de DASTXH
  # Aquí se guarda:
  # - historial de ejecuciones
  # - resultados HTTP
  # - resultados XSS
  # - agrupaciones IA
  # - artifacts y reportes
  # --------------------------------------------------------
  db:
    image: postgres:18.3-alpine3.23
    container_name: dastxh-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - dastxh_net

  # --------------------------------------------------------
  # Servicio: orquestador
  # Backend principal de DASTXH
  #
  # Aloja:
  # - GUI web
  # - API
  # - lógica de escaneo
  # - integración opcional con IA local
  #
  # Cambio importante:
  # - Se exponen al contenedor las variables nuevas de Dalfox.
  # - Se exponen todas las variables de IA usadas por XSS,
  #   hsecscan y cookies.
  # - Se asignan 2 CPU al orquestador para dar más margen
  #   a Dalfox y al backend.
  # --------------------------------------------------------
  orquestador:
    build:
      context: ./orquestador
      dockerfile: Dockerfile

    container_name: dastxh-orquestador
    restart: unless-stopped

    cpus: "2.0"

    depends_on:
      db:
        condition: service_healthy

    environment:
      # ----------------------------------------------------
      # Conexión del backend hacia la BD principal
      # ----------------------------------------------------
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      # ----------------------------------------------------
      # Configuración general del backend
      # ----------------------------------------------------
      DEFAULT_TIMEOUT_SECONDS: ${DEFAULT_TIMEOUT_SECONDS:-30}
      WORKDIR: /work

      # ----------------------------------------------------
      # DASTXH - Interpretación XSS con IA local
      # Docker Model Runner / endpoint OpenAI-compatible
      # ----------------------------------------------------
      DASTXH_AI_ENABLED: ${DASTXH_AI_ENABLED:-false}
      DASTXH_AI_BASE_URL: ${DASTXH_AI_BASE_URL:-http://model-runner.docker.internal:12434/engines/v1}
      DASTXH_AI_MODEL: ${DASTXH_AI_MODEL:-ai/llama3.2}
      DASTXH_AI_API_KEY: ${DASTXH_AI_API_KEY:-not-needed}
      DASTXH_AI_TIMEOUT_SECONDS: ${DASTXH_AI_TIMEOUT_SECONDS:-420}
      DASTXH_AI_MAX_TOKENS: ${DASTXH_AI_MAX_TOKENS:-1200}
      DASTXH_AI_TEMPERATURE: ${DASTXH_AI_TEMPERATURE:-0.1}
      DASTXH_AI_MAX_GROUPS: ${DASTXH_AI_MAX_GROUPS:-20}
      DASTXH_AI_BATCH_SIZE: ${DASTXH_AI_BATCH_SIZE:-5}
      DASTXH_AI_MAX_PAYLOADS_PER_GROUP: ${DASTXH_AI_MAX_PAYLOADS_PER_GROUP:-2}
      DASTXH_AI_MAX_PAYLOAD_CHARS: ${DASTXH_AI_MAX_PAYLOAD_CHARS:-180}
      DASTXH_AI_MAX_EVIDENCE_PER_GROUP: ${DASTXH_AI_MAX_EVIDENCE_PER_GROUP:-1}
      DASTXH_AI_MAX_EVIDENCE_CHARS: ${DASTXH_AI_MAX_EVIDENCE_CHARS:-260}

      # ----------------------------------------------------
      # DASTXH - Traducción hsecscan con IA local
      # ----------------------------------------------------
      DASTXH_HSECSCAN_AI_TRANSLATION_ENABLED: ${DASTXH_HSECSCAN_AI_TRANSLATION_ENABLED:-true}
      DASTXH_HSECSCAN_AI_TRANSLATION_BASE_URL: ${DASTXH_HSECSCAN_AI_TRANSLATION_BASE_URL:-http://model-runner.docker.internal:12434/engines/v1}
      DASTXH_HSECSCAN_AI_TRANSLATION_MODEL: ${DASTXH_HSECSCAN_AI_TRANSLATION_MODEL:-ai/llama3.2}
      DASTXH_HSECSCAN_AI_TRANSLATION_API_KEY: ${DASTXH_HSECSCAN_AI_TRANSLATION_API_KEY:-not-needed}
      DASTXH_HSECSCAN_AI_TRANSLATION_TIMEOUT_SECONDS: ${DASTXH_HSECSCAN_AI_TRANSLATION_TIMEOUT_SECONDS:-300}
      DASTXH_HSECSCAN_AI_TRANSLATION_TEMPERATURE: ${DASTXH_HSECSCAN_AI_TRANSLATION_TEMPERATURE:-0.1}
      DASTXH_HSECSCAN_AI_TRANSLATION_MAX_OUTPUT_TOKENS: ${DASTXH_HSECSCAN_AI_TRANSLATION_MAX_OUTPUT_TOKENS:-3000}
      DASTXH_HSECSCAN_AI_TRANSLATION_BATCH_SIZE: ${DASTXH_HSECSCAN_AI_TRANSLATION_BATCH_SIZE:-1}
      DASTXH_HSECSCAN_AI_TRANSLATION_MAX_ITEMS: ${DASTXH_HSECSCAN_AI_TRANSLATION_MAX_ITEMS:-80}
      DASTXH_HSECSCAN_AI_TRANSLATION_MAX_CHARS_PER_FIELD: ${DASTXH_HSECSCAN_AI_TRANSLATION_MAX_CHARS_PER_FIELD:-650}

      # ----------------------------------------------------
      # DASTXH - Interpretación de cookies con reglas + IA
      # ----------------------------------------------------
      DASTXH_COOKIE_AI_ENABLED: ${DASTXH_COOKIE_AI_ENABLED:-true}
      DASTXH_COOKIE_AI_BASE_URL: ${DASTXH_COOKIE_AI_BASE_URL:-http://model-runner.docker.internal:12434/engines/v1}
      DASTXH_COOKIE_AI_MODEL: ${DASTXH_COOKIE_AI_MODEL:-ai/llama3.2}
      DASTXH_COOKIE_AI_API_KEY: ${DASTXH_COOKIE_AI_API_KEY:-not-needed}
      DASTXH_COOKIE_AI_TIMEOUT_SECONDS: ${DASTXH_COOKIE_AI_TIMEOUT_SECONDS:-240}
      DASTXH_COOKIE_AI_TEMPERATURE: ${DASTXH_COOKIE_AI_TEMPERATURE:-0.1}
      DASTXH_COOKIE_AI_MAX_OUTPUT_TOKENS: ${DASTXH_COOKIE_AI_MAX_OUTPUT_TOKENS:-1800}
      DASTXH_COOKIE_AI_BATCH_SIZE: ${DASTXH_COOKIE_AI_BATCH_SIZE:-2}
      DASTXH_COOKIE_AI_MAX_ITEMS: ${DASTXH_COOKIE_AI_MAX_ITEMS:-80}

      # ----------------------------------------------------
      # DASTXH - Dalfox / XSS
      # Flujo único: evaluación profunda controlada
      # ----------------------------------------------------
      DASTXH_DALFOX_REQUEST_TIMEOUT_SECONDS: ${DASTXH_DALFOX_REQUEST_TIMEOUT_SECONDS:-60}
      DASTXH_DALFOX_HARD_TIMEOUT_SECONDS: ${DASTXH_DALFOX_HARD_TIMEOUT_SECONDS:-900}
      DASTXH_DALFOX_WORKERS: ${DASTXH_DALFOX_WORKERS:-8}
      DASTXH_DALFOX_LIGHT_MINING_ENABLED: ${DASTXH_DALFOX_LIGHT_MINING_ENABLED:-true}
      DASTXH_DALFOX_SKIP_MINING_DOM: ${DASTXH_DALFOX_SKIP_MINING_DOM:-true}
      DASTXH_DALFOX_SKIP_MINING_DICT: ${DASTXH_DALFOX_SKIP_MINING_DICT:-true}

    ports:
      - "${WEB_PORT:-8000}:8000"

    volumes:
      - ./workdata:/work

    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "model-runner.docker.internal:host-gateway"

    working_dir: /app/app

    command:
      [
        "uvicorn",
        "webapp:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload"
      ]

    networks:
      - dastxh_net

  # --------------------------------------------------------
  # Servicio: pgadmin
  # Interfaz web para administrar la base de datos principal
  # --------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: dastxh-pgadmin
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "${PGADMIN_PORT:-5050}:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - dastxh_net

  # --------------------------------------------------------
  # Servicio: combo-lab-db
  # Base de datos propia del laboratorio combinado
  #
  # Esta BD NO es la misma de DASTXH.
  # Se usa solo para el laboratorio.
  # --------------------------------------------------------
  combo-lab-db:
    image: postgres:18.3-alpine3.23
    container_name: dastxh-combo-lab-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${COMBO_LAB_POSTGRES_DB:-combo_lab}
      POSTGRES_USER: ${COMBO_LAB_POSTGRES_USER:-combo_user}
      POSTGRES_PASSWORD: ${COMBO_LAB_POSTGRES_PASSWORD:-combo_pass}

    ports:
      - "${COMBO_LAB_POSTGRES_PORT:-5543}:5432"

    volumes:
      - combo_lab_pgdata:/var/lib/postgresql
      - ./labs/combo-lab/db/init.sql:/docker-entrypoint-initdb.d/001-combo-lab-init.sql:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${COMBO_LAB_POSTGRES_USER:-combo_user} -d ${COMBO_LAB_POSTGRES_DB:-combo_lab}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - dastxh_net

  # --------------------------------------------------------
  # Servicio: combo-lab
  # Laboratorio combinado para pruebas controladas
  #
  # Sirve para:
  # - búsqueda parametrizada
  # - pruebas de cabeceras
  # - pruebas de XSS reflejado con Dalfox
  # --------------------------------------------------------
  combo-lab:
    build:
      context: ./labs/combo-lab
      dockerfile: Dockerfile

    container_name: dastxh-combo-lab
    restart: unless-stopped

    depends_on:
      combo-lab-db:
        condition: service_healthy

    environment:
      LAB_DATABASE_URL: postgresql://${COMBO_LAB_POSTGRES_USER:-combo_user}:${COMBO_LAB_POSTGRES_PASSWORD:-combo_pass}@combo-lab-db:5432/${COMBO_LAB_POSTGRES_DB:-combo_lab}
      PORT: 5000
      PYTHONUNBUFFERED: "1"

    ports:
      - "${COMBO_LAB_PORT:-5003}:5000"

    networks:
      - dastxh_net

# ----------------------------------------------------------
# Volúmenes nombrados del proyecto
# ----------------------------------------------------------
volumes:
  pgdata:
  pgadmin_data:
  combo_lab_pgdata:

# ----------------------------------------------------------
# Red interna compartida del proyecto
# ----------------------------------------------------------
networks:
  dastxh_net:
    name: dastxh_net
    driver: bridge